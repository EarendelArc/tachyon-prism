name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-alpha.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "26.1.0"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  build:
    name: Build ${{ matrix.asset_name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - asset_name: windows-arm64
            os: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
          - asset_name: macos-x64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - asset_name: macos-arm64
            os: macos-15
            rust_target: aarch64-apple-darwin
          - asset_name: linux-x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - asset_name: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "26.1.0"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run build -- --target ${{ matrix.rust_target }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tachyon-prism-${{ matrix.asset_name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: artifacts

      - name: Prepare release assets
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
            prerelease="${{ inputs.prerelease }}"
          else
            version="${GITHUB_REF_NAME}"
            prerelease="false"
            if [[ "${version}" =~ (alpha|beta|rc|pre|preview) ]]; then
              prerelease="true"
            fi
          fi

          mkdir -p release
          find artifacts -type f | sort | while read -r file; do
            artifact="$(echo "${file}" | cut -d/ -f2)"
            base="$(basename "${file}")"
            cp "${file}" "release/${artifact}_${base}"
          done
          (cd release && sha256sum * > SHA256SUMS.txt)

          {
            echo "Tachyon Prism ${version}"
            echo
            echo "This automated release contains unsigned Tachyon Prism desktop bundles."
            echo "Prism manages Xray Core and Tachyon Core as external binaries and can select stable or preview release channels for each core."
            echo
            echo "Artifacts:"
            for file in release/*; do
              echo "- $(basename "${file}")"
            done
            echo
            echo "Verify downloads with SHA256SUMS.txt."
            echo "macOS builds are not notarized yet and Windows builds are not Authenticode-signed yet."
          } > release/RELEASE_NOTES.md

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release edit "${VERSION}" \
              --title "Tachyon Prism ${VERSION}" \
              --notes-file release/RELEASE_NOTES.md \
              "${prerelease_flag[@]}"
          else
            gh release create "${VERSION}" \
              --target "${GITHUB_SHA}" \
              --title "Tachyon Prism ${VERSION}" \
              --notes-file release/RELEASE_NOTES.md \
              "${prerelease_flag[@]}"
          fi
          gh release upload "${VERSION}" release/* --clobber
