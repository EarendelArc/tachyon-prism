name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "26.4.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: TypeCheck
        run: npm run typecheck

      - name: Frontend Tests
        run: npm test

      - name: Web Build
        run: npm run web:build

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Use crates.io on GitHub Actions
        working-directory: .
        shell: bash
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [registries.crates-io]
          protocol = "sparse"

          [net]
          git-fetch-with-cli = true
          EOF

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test
